<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardTrader Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0f0f1a;
      color: #d4c9b8;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      background: #0a0a15;
      border-bottom: 1px solid #2a2a40;
    }
    .logo { font-size: 15px; font-weight: 700; color: #e8d5b7; letter-spacing: 0.04em; }
    .subtitle { font-size: 11px; color: #5a5068; margin-top: 2px; }
    .section { padding: 14px 16px; border-bottom: 1px solid #1e1e30; }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a3f5c;
      margin-bottom: 10px;
    }
    .wl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      background: #14141f;
      border: 1px solid #1e1e2e;
      margin-bottom: 4px;
    }
    .wl-item-name { font-size: 12px; color: #d4c9b8; }
    .wl-item-meta { font-size: 10px; color: #5a5068; }
    .wl-delete {
      background: none;
      border: none;
      color: #4a3f5c;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .wl-delete:hover { color: #c0504a; }
    .empty { color: #4a3f5c; font-size: 12px; padding: 4px 0; }
    .import-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .file-btn {
      flex: 1;
      padding: 7px 10px;
      background: #1a1a2e;
      border: 1px dashed #2a2a40;
      border-radius: 6px;
      color: #6a6070;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .file-btn:hover { border-color: #4a3f5c; color: #d4c9b8; }
    #csv-input { display: none; }
    .status {
      padding: 10px 16px;
      font-size: 11px;
      color: #5a5068;
      text-align: center;
    }
    .status.ok { color: #6a9a6a; }
    .status.err { color: #a06060; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CT Assistant</div>
    <div class="subtitle">CardTrader Wishlist Matcher</div>
  </div>

  <div class="section">
    <div class="section-title">Wishlist salvate</div>
    <div id="wl-list"><div class="empty">Nessuna wishlist salvata.</div></div>
  </div>

  <div class="section">
    <div class="section-title">Importa da CSV</div>
    <div class="import-row">
      <label class="file-btn" for="csv-input">📂 Scegli file CSV</label>
      <input type="file" id="csv-input" accept=".csv,.txt">
    </div>
    <div style="margin-top: 8px; display: flex; gap: 6px; align-items: center;">
      <input type="text" id="csv-name" placeholder="Nome persona/wishlist"
        style="flex:1;background:#1a1a2e;border:1px solid #2a2a40;border-radius:6px;color:#d4c9b8;padding:6px 8px;font-size:12px;">
    </div>
    <div id="csv-status" class="status" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
